<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Coconut — Your Memory Partner</title>
    <!-- Uncomment and add your App Store ID once published -->
    <!-- <meta name="apple-itunes-app" content="app-id=YOUR_APP_ID"> -->
    <!-- <meta http-equiv="refresh" content="0;url=https://apps.apple.com/app/coconut/idYOUR_APP_ID"> -->
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            text-align: center;
            padding: 80px 24px;
            background: #FAF8F5;
            color: #333;
            min-height: 100vh;
        }
        .icon {
            font-size: 64px;
            margin-bottom: 24px;
        }
        h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 12px;
        }
        p {
            color: #666;
            font-size: 17px;
            line-height: 1.5;
            max-width: 320px;
            margin: 0 auto;
        }
        .cta {
            display: inline-block;
            margin-top: 32px;
            padding: 16px 32px;
            background: #333;
            color: white;
            text-decoration: none;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 500;
        }
        .cta:hover {
            background: #555;
        }
        .subtle {
            margin-top: 48px;
            font-size: 14px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="icon">🥥</div>
    <h1>someone shared a memory with you</h1>
    <p>open it in coconut — your memory partner</p>
    <!-- Update href with your App Store link once published -->
    <a class="cta" href="https://apps.apple.com/app/coconut">get coconut</a>
    <p class="subtle">already have coconut? tap the link again after installing to view the memory.</p>
</body>
</html>
